id: notes/notion-recent
title: Recent Notion pages
description: Recently edited Notion pages visible to the authenticated integration.
type: notion.page
mode: event
schema_url: https://agentfeeds.dev/schemas/notion.page.v1.json
schema_version: 1.0.0
parameters: []
source_uri_template: "feed://api.notion.com/pages/recent"
adapter:
  kind: json_http
  url: "https://api.notion.com/v1/search"
  method: POST
  auth_service: notion
  headers:
    Content-Type: application/json
    Notion-Version: "2022-06-28"
  body:
    page_size: 50
    filter:
      property: object
      value: page
    sort:
      direction: descending
      timestamp: last_edited_time
  transform:
    language: jmespath
    expression: |
      results[].{
        id: id,
        title: properties.*.title[0].plain_text | [0],
        url: url,
        last_edited_at: last_edited_time,
        created_at: created_time,
        parent_type: parent.type
      }
  id_from: id
recommended_poll_interval_seconds: 900
auth: bearer_token
tags: [notes, notion, recent, keychain, auth]
quality_tier: experimental
catalog_tier: 3
catalog_order: 50
requires: [keychain_bearer_token]
contributed_by: agentfeeds
