id: space/iss-location
title: Current ISS location
description: Current latitude and longitude for the International Space Station.
type: space.iss-location
mode: snapshot
schema_url: https://agentfeeds.dev/schemas/space.iss-location.v1.json
schema_version: 1.0.0
parameters: []
source_uri_template: "feed://api.open-notify.org/iss-now"
adapter:
  kind: json_http
  url: "http://api.open-notify.org/iss-now.json"
  method: GET
  headers: {}
  transform:
    language: jmespath
    expression: |
      {
        latitude: iss_position.latitude,
        longitude: iss_position.longitude,
        timestamp: timestamp
      }
  id_from: "to_string(timestamp)"
recommended_poll_interval_seconds: 60
auth: none
tags: [space, iss, free, no-auth]
quality_tier: verified
contributed_by: agentfeeds
