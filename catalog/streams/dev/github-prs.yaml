id: dev/github-prs
title: GitHub repository pull requests
description: Recent pull requests for a GitHub repository visible to the configured
  token.
type: github.pull-request
mode: event
schema_url: https://agentfeeds.dev/schemas/github.pull-request.v1.json
schema_version: 1.0.0
parameters:
- name: owner
  type: string
  description: GitHub repository owner
  required: true
- name: repo
  type: string
  description: GitHub repository name
  required: true
- name: state
  type: string
  description: Pull request state, such as open, closed, or all
  required: true
source_uri_template: feed://api.github.com/repos/{owner}/{repo}/pulls?state={state}
adapter:
  kind: paginated_json_http
  url: https://api.github.com/repos/{owner}/{repo}/pulls?state={state}&per_page=30
  method: GET
  headers:
    Accept: application/vnd.github+json
  transform:
    language: jmespath
    expression: "[].{\n  number: number,\n  title: title,\n  state: state,\n  html_url:\
      \ html_url,\n  user: user.login,\n  draft: draft,\n  head_ref: head.ref,\n \
      \ base_ref: base.ref,\n  created_at: created_at,\n  updated_at: updated_at,\n\
      \  closed_at: closed_at,\n  merged_at: merged_at,\n  body: body\n}\n"
  id_from: number
  auth_service: github
recommended_poll_interval_seconds: 900
auth: bearer_token
tags:
- dev
- github
- pull-request
- prs
- keychain
- auth
quality_tier: verified
catalog_tier: 4
catalog_order: 60
contributed_by: agentfeeds
