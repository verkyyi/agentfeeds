id: dev/hackernews-frontpage
title: Hacker News front page
description: Current Hacker News front page stories via the Algolia API.
type: hn.story
mode: event
schema_url: https://agentfeeds.dev/schemas/hn.story.v1.json
schema_version: 1.0.0
parameters: []
source_uri_template: "feed://hn.algolia.com/frontpage"
adapter:
  kind: paginated_json_http
  url: "https://hn.algolia.com/api/v1/search?tags=front_page"
  method: GET
  headers: {}
  transform:
    language: jmespath
    expression: |
      hits[].{
        id: objectID,
        title: title,
        url: url,
        score: points,
        by: author
      }
  id_from: id
recommended_poll_interval_seconds: 600
auth: none
tags: [dev, news, hackernews, free, no-auth]
quality_tier: verified
contributed_by: agentfeeds
