id: mac/imessage-unread
title: Unread iMessage conversations
description: Recent iMessage conversations with unread counts and last-message snippets.
type: mac.imessage-thread
mode: event
schema_url: https://agentfeeds.dev/schemas/mac.imessage-thread.v1.json
schema_version: 1.0.0
parameters: []
source_uri_template: "feed://mac.imessage/unread?limit=25"
adapter:
  kind: sqlite_query
  database: "~/Library/Messages/chat.db"
  read_only: true
  tcc_permission: Full Disk Access
  query: |
    SELECT chat.ROWID, chat.display_name, message.text, message.date
    FROM chat
    JOIN chat_message_join ON chat.ROWID = chat_message_join.chat_id
    JOIN message ON message.ROWID = chat_message_join.message_id
    WHERE message.is_read = 0
    ORDER BY message.date DESC
    LIMIT 25
  columns: [thread_id, display_name, snippet, last_message_at]
  timestamp_columns:
    last_message_at: mac_absolute_ns
  static:
    participants: []
    unread_count: 1
  id_column: thread_id
  time_column: last_message_at
recommended_poll_interval_seconds: 900
auth: none
tags: [mac, imessage, messages, unread, sqlite, tcc, no-auth]
quality_tier: experimental
catalog_tier: 1
catalog_order: 60
platforms: [macos]
requires: [full_disk_access]
contributed_by: agentfeeds
