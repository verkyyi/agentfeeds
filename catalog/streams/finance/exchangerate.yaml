id: finance/exchangerate
title: Current exchange rates
description: Current currency exchange rates for a base currency.
type: finance.exchange-rate
mode: snapshot
schema_url: https://agentfeeds.dev/schemas/finance.exchange-rate.v1.json
schema_version: 1.0.0
parameters:
  - name: base
    type: string
    description: Base currency code such as USD or EUR
    required: true
source_uri_template: "feed://api.exchangerate.host/latest?base={base}"
adapter:
  kind: json_http
  url: "https://api.exchangerate.host/latest?base={base}"
  method: GET
  headers: {}
  transform:
    language: jmespath
    expression: |
      {
        base: base,
        date: date,
        rates: rates
      }
  id_from: "joined(['-', [base, date]])"
recommended_poll_interval_seconds: 3600
auth: none
tags: [finance, currency, exchange-rate, free, no-auth]
quality_tier: verified
contributed_by: agentfeeds
